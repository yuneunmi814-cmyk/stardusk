name: Stardust
options:
  bundleIdPrefix: app.stardust
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "DA6448DUH9"   # Apple Developer 팀 ID (eunmi yun)
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  KakaoOpenSDK:
    url: https://github.com/kakao/kakao-ios-sdk
    from: "2.11.0"
  NaverThirdPartyLogin:
    url: https://github.com/naver/naveridlogin-sdk-ios
    from: "4.2.3"

targets:
  Stardust:
    type: application
    platform: iOS
    sources:
      - path: Stardust
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: KakaoOpenSDK
        product: KakaoSDKCommon
      - package: KakaoOpenSDK
        product: KakaoSDKAuth
      - package: KakaoOpenSDK
        product: KakaoSDKUser
      - package: NaverThirdPartyLogin
        product: NaverThirdPartyLogin
    # Debug/Release 별 API 호스트는 Config/*.xcconfig 로 주입한다(소스 밖에 둬서
    # 리소스로 포함되지 않게 한다). 값은 Info.plist 의 STARDUST_API_BASE_URL 로 흘러간다.
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.stardust.ios
        INFOPLIST_FILE: Stardust/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
    # Sign in with Apple capability. 실기기/배포 빌드 시 Apple Developer 팀(DEVELOPMENT_TEAM)
    # 을 설정하면 Xcode 가 자동으로 프로비저닝에 capability 를 포함한다.
    entitlements:
      path: Stardust/Resources/Stardust.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
