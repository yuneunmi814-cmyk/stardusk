name: Stardust
options:
  bundleIdPrefix: app.stardust
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Stardust:
    type: application
    platform: iOS
    sources:
      - path: Stardust
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.stardust.ios
        INFOPLIST_FILE: Stardust/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
    # 출시 시: Apple Developer 팀을 연결하고 아래 엔타이틀먼트를 활성화한다.
    # entitlements:
    #   path: Stardust/Resources/Stardust.entitlements
    #   properties:
    #     com.apple.developer.applesignin: [Default]
