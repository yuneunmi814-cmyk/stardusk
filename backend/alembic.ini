# 경로: backend/alembic.ini
# Alembic 설정. DB URL 은 alembic/env.py 에서 app.core.config.settings 로 주입하므로
# 여기서는 비워둔다(동기 드라이버 psycopg2 로 변환됨).

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url 은 env.py 에서 동적으로 설정

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
